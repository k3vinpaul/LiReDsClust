# =============================================================================
# OneCovariance Template Configuration
# =============================================================================
# This is a TEMPLATE — do not run OneCovariance with this file directly.
#
# The actual config.ini used for each run is auto-generated by:
#   src/covariance.prepare_onecovariance_inputs(...)
# or by running:
#   python scripts/run_covariance.py --sample <sample_name>
#
# The generator fills in the correct file paths, survey area, n_eff, and
# angular bin limits derived from the data.  Values marked {{PLACEHOLDER}}
# below are replaced at generation time.
#
# Reference: https://github.com/rreischke/OneCovariance
# =============================================================================


[covariance terms]
# Only Gaussian covariance is computed by default.
# Set nongauss = True or ssc = True to include higher-order terms
# (requires significantly more compute time).
gauss    = True
nongauss = False
ssc      = False


[observables]
cosmic_shear = False
ggl          = False
clustering   = True
est_clust    = w          # Landy-Szalay angular correlation function
cross_terms  = False


[covTHETAspace settings]
# Angular bin limits in ARCMINUTES (converted from degrees at generation time).
theta_min_clustering  = {{MIN_SEP_ARCMIN}}
theta_max_clustering  = {{MAX_SEP_ARCMIN}}
theta_bins_clustering = {{NBINS}}
theta_type_clustering = log
theta_accuracy        = 1e-2
integration_intervals = 400


[survey specs]
survey_area_clust_in_deg2   = {{AREA_DEG2}}
survey_area_ggl_in_deg2     = {{AREA_DEG2}}
survey_area_lensing_in_deg2 = {{AREA_DEG2}}
n_eff_clust                 = {{N_EFF}}       # galaxies / arcmin^2
n_eff_lensing               = {{N_EFF}}
ellipticity_dispersion      = 0.27
mask_directory              = {{MASK_DIR}}
mask_file_clust             = {{MASK_FILE}}


[redshift]
zclust_directory        = {{NZ_DIR}}
zclust_file             = nz_bin1.ascii
value_loc_in_clustbin   = mid


[bias]
bias_files = {{BIAS_FILE}}


[cosmo]
# Planck 2018 cosmology (TT,TE,EE+lowE+lensing, Table 2).
sigma8   = 0.81
h        = 0.67
omega_m  = 0.32
omega_b  = 0.049
omega_de = 0.68
w0       = -1.0
wa       =  0.0
ns       =  0.965
neff     =  3.046
m_nu     =  0.06


[tabulated inputs files]
npair_directory = {{NPAIR_DIR}}
npair_gg_file   = npair_gg_Bin?_Bin?.ascii


[output settings]
directory = {{OUTPUT_DIR}}
file      = cov_list.dat, cov_matrix.mat
style     = list, matrix


[misc]
num_cores = 4
